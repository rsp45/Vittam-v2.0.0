services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: dvrm
      POSTGRES_USER: dvrm
      POSTGRES_PASSWORD: dvrm_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
